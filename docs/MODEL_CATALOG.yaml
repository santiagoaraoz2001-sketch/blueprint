# MODEL_CATALOG.yaml — Single source of truth for model intelligence.
#
# Used by the Copilot rule engine (OOM prediction, context window checks)
# and the frontend client-side rule engine.
#
# Consumed by:
#   - backend/services/model_catalog.py  → Python model lookup
#   - scripts/generate_model_catalog.py  → frontend/src/lib/generated/model-catalog.generated.ts
#
# EDITING: update this file, then run `python scripts/generate_model_catalog.py`.
# Do NOT edit model-catalog.generated.ts by hand.
#
# Structure:
#   Each entry in `families` defines a model family with:
#     - pattern: regex matched against lowercase, normalized model name
#     - params_b: parameter count in billions
#     - context: context window in tokens
#     - aliases: list of common shortened names (for exact substring match)
#
# Normalization: before matching, model names are lowercased and all of
# [ /, _, . ] are replaced with '-'. E.g.:
#   "meta-llama/Llama-3.1-8B-Instruct" → "meta-llama-llama-3-1-8b-instruct"
#   "Qwen/Qwen2.5-72B-Instruct"        → "qwen-qwen2-5-72b-instruct"
#
# Families are matched top-to-bottom; first match wins.
# Put more specific patterns (e.g. "llama-3.1-405b") BEFORE generic ones.

families:

