# ── Heuristic Extraction Patterns ─────────────────────────────────
# When no family matches, the model catalog tries to extract parameter
# counts from the model name itself using these regex patterns.
# Matched against the normalized (lowercased, dashes-for-separators) name.
# First capturing group must be the numeric part.
heuristic_patterns:
  # "70b", "7b", "1.5b", "0.5b" — billions
  - pattern: "(\\d+(?:\\.\\d+)?)b(?:\\b|[-_])"
    unit: "B"
  # "350m", "125m" — millions → divide by 1000
  - pattern: "(\\d+(?:\\.\\d+)?)m(?:\\b|[-_])"
    unit: "M"
