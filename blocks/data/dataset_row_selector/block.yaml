name: Dataset Row Selector
type: dataset_row_selector
category: data
version: "2.0.0"
description: Extract specific rows from a dataset by index, column value, or random sampling
maturity: stable
tags: [adapter, selection, dataset]

inputs:
  - id: dataset
    label: Dataset
    data_type: dataset
    required: true

outputs:
  - id: selected_dataset
    label: Selected Rows
    aliases: [dataset]
    data_type: dataset

  - id: text
    label: First Row as Text
    data_type: text
  - id: metrics
    label: Metrics
    data_type: metrics

config:
  mode:
    type: select
    label: Selection Mode
    default: "first"
    options: ["first", "last", "index", "random", "filter"]
  index:
    type: integer
    label: Row Index
    default: 0
    depends_on:
      field: mode
      value: index
  count:
    type: integer
    label: Number of Rows
    default: 1
    min: 1
  filter_column:
    type: string
    label: Filter Column
    default: ""
    depends_on:
      field: mode
      value: filter
  filter_value:
    type: string
    label: Filter Value
    default: ""
    depends_on:
      field: mode
      value: filter
  seed:
    type: integer
    label: Random Seed
    default: 42
    description: "Seed for reproducible random sampling"
    depends_on:
      field: mode
      value: random
  text_column:
    type: string
    label: Text Column for Text Output
    default: "text"
    description: "Which column to output as text (auto-detects if not found)"
