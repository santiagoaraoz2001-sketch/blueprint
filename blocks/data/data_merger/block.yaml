name: Data Merger
type: data_merger
category: data
description: Merge or concatenate multiple datasets
version: "2.0.0"

inputs:
  - id: dataset_a
    label: Dataset A
    data_type: dataset
    required: true
  - id: dataset_b
    label: Dataset B
    data_type: dataset
    required: true
  - id: dataset_c
    label: Dataset C
    data_type: dataset
    required: false
  - id: dataset_meta
    label: Dataset Info
    data_type: config
    required: false

outputs:
  - id: dataset
    label: Merged
    data_type: dataset
    description: "JSON array of merged rows. concat: all rows stacked. join: matched rows combined (conflicting column names get join_suffix appended). interleave: rows alternated from each source. dedup: unique rows only."
  - id: output_dataset_meta
    label: Dataset Info
    data_type: config
    aliases: [dataset_meta]
    required: false

  - id: stats
    label: Merge Stats
    data_type: metrics
    description: "Object with rows_a, rows_b, rows_c, merged_rows, method"

config:
  method:
    type: select
    label: Method
    options: [concat, join, interleave, dedup]
    default: concat
    description: Merge strategy
  join_key:
    type: string
    label: Join Key
    default: ""
    description: Column name to join on (for join method)
  join_type:
    type: select
    label: Join Type
    options: [inner, left, outer]
    default: inner
    description: Type of join operation
  join_suffix:
    type: string
    label: Join Suffix
    default: "_b"
    description: Suffix appended to conflicting column names from Dataset B during join
  dedup_columns:
    type: string
    label: Dedup Columns
    default: ""
    description: "Comma-separated columns for dedup (empty = all columns)"
  add_source_column:
    type: boolean
    label: Add Source Column
    default: false
    description: Tag each row with _source indicating which dataset it came from
  shuffle:
    type: boolean
    label: Shuffle After Merge
    default: false
    description: Shuffle rows after merging (critical for training data mixing)
  seed:
    type: integer
    label: Random Seed
    default: 42
    description: Seed for reproducible shuffle
  weight_a:
    type: integer
    label: Weight A
    default: 1
    min: 1
    max: 50
    description: Repeat factor for Dataset A (weighted mixing for domain adaptation)
  weight_b:
    type: integer
    label: Weight B
    default: 1
    min: 1
    max: 50
    description: Repeat factor for Dataset B
  weight_c:
    type: integer
    label: Weight C
    default: 1
    min: 1
    max: 50
    description: Repeat factor for Dataset C
