name: FrankenMerge
type: frankenmerge
category: merge
description: Layer-by-layer model assembly from multiple sources
version: "1.0.0"

inputs:
  - id: model_a
    label: Model A
    data_type: model
    required: true
  - id: model_b
    label: Model B
    data_type: model
    required: true

outputs:
  - id: model
    label: FrankenModel
    data_type: model
  - id: metrics
    label: Merge Metrics
    data_type: metrics

config:
  layer_config:
    type: text_area
    label: "Layer Config (JSON)"
    description: 'JSON array of slices, e.g. [{"model": "A", "layer_range": [0, 16]}, {"model": "B", "layer_range": [16, 32]}]'
    default: "[]"
  merge_embed:
    type: select
    label: Embedding From
    description: Which model provides the embedding and tokenizer
    options: [a, b, average]
    default: "a"
  output_name:
    type: string
    label: Output Name
    description: Name for the assembled model
    default: "frankenmerge-model"
