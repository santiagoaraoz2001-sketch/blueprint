name: DARE Merge
type: dare_merge
category: merge
description: Drop And REscale merge strategy
version: 1.0.0
inputs:
- id: model_a
  label: Model A
  data_type: model
  required: true
- id: model_b
  label: Model B
  data_type: model
  required: true
- id: base
  label: Base Model
  data_type: model
  required: true
outputs:
- id: model
  label: DARE Model
  data_type: model
- id: metrics
  label: Merge Metrics
  data_type: metrics
config:
  model_a_name:
    type: string
    label: Model A (fallback)
    default: ''
    description: HuggingFace model ID for Model A (used when input port not connected)
  model_b_name:
    type: string
    label: Model B (fallback)
    default: ''
    description: HuggingFace model ID for Model B (used when input port not connected)
  weight:
    type: float
    label: Weight (Model B)
    description: Blend weight for Model B
    default: 0.5
    min: 0
    max: 1
  density:
    type: float
    label: Density (retention rate)
    description: Proportion of parameters retained (higher = less pruning)
    default: 0.5
    min: 0
    max: 1
  rescale:
    type: boolean
    label: Rescale
    description: Rescale weights after dropping (DARE-TIES vs DARE-Linear)
    default: true
  output_name:
    type: string
    label: Output Name
    description: Name for the merged model
    default: dare-merged-model
side_inputs:
- id: _loop
  label: Loop
  data_type: any
  required: false
maturity: stable
exportable: true
requires: []
execution:
  isolation: inprocess
