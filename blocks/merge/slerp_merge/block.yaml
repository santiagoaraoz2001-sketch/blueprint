name: SLERP Merge
type: slerp_merge
category: merge
description: Spherical linear interpolation of model weights
version: "1.0.0"

inputs:
  - id: model_a
    label: Model A
    data_type: model
    required: true
  - id: model_b
    label: Model B
    data_type: model
    required: true

outputs:
  - id: model
    label: SLERP Model
    data_type: model
  - id: metrics
    label: Merge Metrics
    data_type: metrics

config:
  weight:
    type: float
    label: "Interpolation Weight (t)"
    description: "0 = all Model A, 1 = all Model B"
    default: 0.5
    min: 0
    max: 1
  output_name:
    type: string
    label: Output Name
    description: Name for the merged model
    default: "slerp-merged-model"
