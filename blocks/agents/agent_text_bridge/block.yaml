name: "Agent \u2192 Text"
type: agent_text_bridge
category: agents
description: Extract text from structured agent outputs for downstream processing
version: "1.1.0"

inputs:
  - id: agent
    label: Agent Output
    data_type: any
    required: true
  - id: dataset
    label: Task Context
    data_type: dataset
    required: false

outputs:
  - id: text
    label: Extracted Text
    data_type: text
  - id: dataset
    label: Full Responses
    data_type: dataset
  - id: metrics
    label: Extraction Metrics
    data_type: metrics

config:
  extract_field:
    type: string
    label: Extract Field
    default: final_answer
    description: Primary JSON field to extract from agent output
  fallback_fields:
    type: string
    label: Fallback Fields
    default: "response,output,text,code,answer"
    description: Comma-separated fallback field names tried in order if primary field is missing
  separator:
    type: string
    label: List Separator
    default: "\n---\n"
    description: Separator used when joining multiple extracted items
  max_length:
    type: integer
    label: Max Output Length
    default: 0
    min: 0
    max: 1000000
    description: "Maximum characters in extracted text (0 = no limit). Truncated with '...' suffix."
  output_format:
    type: select
    label: Output Format
    options: [raw, markdown, json]
    default: raw
    description: "raw: text as-is, markdown: with metadata header, json: structured extraction result"
