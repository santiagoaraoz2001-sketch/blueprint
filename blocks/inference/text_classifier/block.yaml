name: Text Classifier
type: text_classifier
category: inference
description: Classify text into categories using LLM, zero-shot transformers, or keyword rules
version: "2.0.0"
deprecated: true
deprecated_message: "Use LLM Inference block with a classification prompt."

inputs:
  - id: model
    label: Classifier Model
    data_type: model
    required: false
  - id: text
    label: Input Text
    data_type: text
    required: true
  - id: dataset
    label: Examples
    data_type: dataset
    required: false

outputs:
  - id: text
    label: Classification
    data_type: text
    description: >
      When output_format is "text", a JSON file (classification.json) containing
      the classification result object with fields: label (string, the winning
      category or comma-separated categories when multi_label is true),
      confidence (float 0-1, score of the best label), all_scores (object,
      mapping every category to its confidence score), text_length (integer,
      character count of the input), method (string, the classification method
      actually used — may differ from config if a fallback occurred), and
      elapsed_s (float, seconds taken). When output_format is "json", the file
      is classification.json containing those same fields plus: model (string),
      provider (string), categories (array of configured category strings),
      multi_label (boolean), and timestamp (ISO-8601 string).
  - id: metrics
    label: Confidence
    data_type: metrics
    description: >
      Dictionary mapping each configured category (string) to its confidence
      score (float 0-1). For LLM-based methods the scores are derived from
      the model's JSON response; for zero_shot they come from the transformers
      pipeline; for keyword they are normalized keyword-frequency ratios.

config:
  method:
    type: select
    label: Method
    description: "Classification method: llm, zero_shot (transformers), few_shot (LLM with examples), keyword"
    default: llm
    options: [llm, zero_shot, few_shot, keyword]
  categories:
    type: string
    label: Categories
    description: Comma-separated classification labels
    default: "positive,negative,neutral"
  provider:
    type: select
    label: Provider
    options: [ollama, mlx, openai, anthropic]
    default: ollama
    description: "LLM provider (used for llm/few_shot methods)"
  model_name:
    type: string
    label: Model Name
    default: "llama3.2"
    description: "Model for LLM classification or HF model path"
  endpoint:
    type: string
    label: Endpoint URL
    default: "http://localhost:11434"
  api_key:
    type: string
    label: API Key
    default: ""
    description: "API key for OpenAI/Anthropic"
  input_column:
    type: string
    label: Example Input Column
    default: "text"
    description: "Column with example texts (for few_shot method)"
  label_column:
    type: string
    label: Example Label Column
    default: "label"
    description: "Column with example labels (for few_shot method)"
  num_examples:
    type: integer
    label: Num Examples
    default: 5
    min: 1
    max: 20
    description: "Number of few-shot examples to include"
  multi_label:
    type: boolean
    label: Multi-Label
    default: false
    description: "Allow assigning multiple categories (e.g. content can be both 'spam' and 'offensive')"
  confidence_threshold:
    type: float
    label: Confidence Threshold
    default: 0.0
    min: 0.0
    max: 1.0
    description: "Minimum confidence to assign a label. Labels below this are excluded from multi-label results"
  classification_instructions:
    type: text_area
    label: Classification Instructions
    default: ""
    description: "Additional instructions for the LLM classifier (e.g. 'Focus on sentiment, ignore sarcasm')"
  output_format:
    type: select
    label: Output Format
    description: "Format for text output — text returns raw result, json wraps with metadata"
    default: text
    options: [text, json]
