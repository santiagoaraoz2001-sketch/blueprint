name: Structured Output
type: structured_output
category: inference
description: Generate JSON/structured data from LLM using a schema
version: "1.0.0"
deprecated: true
deprecated_message: "Use LLM Inference block with output_format set to json."

inputs:
  - id: model
    label: Model
    data_type: model
    required: false
  - id: text
    label: User Prompt
    data_type: text
    required: false
  - id: schema
    label: Output Schema
    data_type: config
    required: false

outputs:
  - id: data
    label: Structured Data
    data_type: config
  - id: text
    label: Raw JSON Text
    data_type: text
  - id: metrics
    label: Metrics
    data_type: metrics

config:
  provider:
    type: select
    label: Provider
    options: [ollama, openai, anthropic]
    default: ollama
  model_name:
    type: string
    label: Model Name
    default: "llama3.2"
  output_schema:
    type: text_area
    label: Output Schema (JSON)
    default: '{"name": "string", "age": "integer", "summary": "string"}'
    description: "JSON schema the LLM must conform to"
  user_prompt:
    type: text_area
    label: User Prompt
    default: ""
    description: "The user prompt (overridden by connected text input)"
  system_prompt:
    type: text_area
    label: System Prompt
    default: ""
    description: "Optional system message"
  strict_mode:
    type: boolean
    label: Strict Mode
    default: true
    description: "Fail if output is not valid JSON"
  endpoint:
    type: string
    label: Endpoint URL
    default: "http://localhost:11434"
  api_key:
    type: string
    label: API Key
    default: ""
  temperature:
    type: float
    label: Temperature
    default: 0.3
    min: 0.0
    max: 2.0
  max_tokens:
    type: integer
    label: Max Tokens
    default: 1024
    min: 1
    max: 32768
  max_retries:
    type: integer
    label: Max Retries
    default: 2
    min: 0
    max: 5
    description: "Retry LLM call if JSON parsing fails. Each retry re-prompts with stricter instructions"
