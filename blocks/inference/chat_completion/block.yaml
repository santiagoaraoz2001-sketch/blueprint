name: Chat Completion
type: chat_completion
category: inference
description: Multi-turn chat with system/user/assistant messages via any LLM provider
version: "1.0.0"
deprecated: true
deprecated_message: "Use LLM Inference block with system_prompt and prompt inputs."

inputs:
  - id: model
    label: Model
    data_type: model
    required: false
  - id: messages
    label: Messages / History
    data_type: text
    required: false
  - id: text
    label: User Message
    data_type: text
    required: false

outputs:
  - id: response
    label: Response
    data_type: text
    description: >
      Plain text file (response.txt) containing the assistant's reply when output_format=text.
      When output_format=json, a JSON file (response.json) with schema:
      {"response": str, "model": str, "provider": str, "timestamp": str (ISO 8601), "usage": {"prompt_tokens": int, "completion_tokens": int, "total_tokens": int} (optional)}
  - id: messages
    label: Full Conversation
    data_type: text
    description: >
      JSON file (conversation.json) containing the full message array including the new assistant reply.
      Each element has schema: {"role": str ("system"|"user"|"assistant"), "content": str}
  - id: metrics
    label: Token Usage
    data_type: metrics
    description: >
      Dictionary with fields: model (str), provider (str), message_count (int),
      response_length (int, chars), prompt_tokens (int, optional),
      completion_tokens (int, optional), total_tokens (int, optional)

config:
  provider:
    type: select
    label: Provider
    options: [ollama, mlx, openai, anthropic]
    default: ollama
    description: "Auto-filled from connected Model Selector. Override only if needed."
  model_name:
    type: string
    label: Model Name
    default: "llama3.2"
    description: "Auto-filled from connected Model Selector. Override only if needed."
  system_prompt:
    type: text_area
    label: System Prompt
    default: "You are a helpful assistant."
    description: "System message that sets the assistant's behavior"
  user_message:
    type: text_area
    label: User Message
    default: ""
    description: "Direct user message (overridden by connected text input)"
  endpoint:
    type: string
    label: Endpoint URL
    default: "http://localhost:11434"
    description: "Auto-filled from connected Model Selector. Override only if needed."
  api_key:
    type: string
    label: API Key
    default: ""
    description: "Auto-filled from connected Model Selector. Supports $secret:OPENAI_API_KEY syntax."
  temperature:
    type: float
    label: Temperature
    default: 0.7
    min: 0.0
    max: 2.0
  max_tokens:
    type: integer
    label: Max Tokens
    default: 1024
    min: 1
    max: 32768
  top_p:
    type: float
    label: Top P
    default: 1.0
    min: 0.0
    max: 1.0
    description: "Nucleus sampling for diversity control"
  max_history_turns:
    type: integer
    label: Max History Turns
    default: -1
    min: -1
    max: 100
    description: "Limit conversation history to N most recent turns (-1 = unlimited). Prevents context overflow"
  frequency_penalty:
    type: float
    label: Frequency Penalty
    default: 0.0
    min: -2.0
    max: 2.0
    description: "Penalize repeated tokens (positive = less repetition)"
  presence_penalty:
    type: float
    label: Presence Penalty
    default: 0.0
    min: -2.0
    max: 2.0
    description: "Penalize tokens already present (positive = more diverse topics)"
  output_format:
    type: select
    label: Output Format
    description: "Format for the response output — text returns raw LLM response, json wraps it with metadata (model, provider, tokens, timestamp)"
    default: text
    options: [text, json]
