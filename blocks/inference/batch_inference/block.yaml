name: Batch Inference
type: batch_inference
category: inference
description: Run model inference on every row of a dataset
version: "1.0.0"
deprecated: true
deprecated_message: "Use LLM Inference block with a dataset input instead."

inputs:
  - id: dataset
    label: Dataset
    data_type: dataset
    required: true
  - id: model
    label: Model
    data_type: model
    required: false

outputs:
  - id: dataset
    label: Results Dataset
    data_type: dataset
    description: >
      JSON array of result objects. Each row: {_row_index, input, <response_column>, ...original_row_fields}.
      Column name for the model response is configurable via response_column (default: "_response").
      Output format configurable via dataset_format (json, jsonl, csv).
  - id: metrics
    label: Batch Metrics
    data_type: metrics
    description: >
      {total_rows, errors, elapsed_s, rows_per_second, model, provider}.
      total_rows: number of rows processed. errors: count of failed rows.
      elapsed_s: wall-clock seconds. rows_per_second: throughput rate.
      model: model identifier used. provider: inference provider used.

config:
  provider:
    type: select
    label: Provider
    options: [ollama, mlx, openai, anthropic]
    default: ollama
  model_name:
    type: string
    label: Model Name
    default: ""
    description: "Model identifier (overridden by connected model)"
  text_column:
    type: string
    label: Text Column
    default: "text"
    description: "Column containing input text for each row"
  prompt_template:
    type: text_area
    label: Prompt Template
    default: "{text}"
    description: "Template applied to each row. Use {column_name} for substitution"
  system_prompt:
    type: text_area
    label: System Prompt
    default: ""
    description: "Optional system message sent with each request"
  endpoint:
    type: string
    label: Endpoint URL
    default: "http://localhost:11434"
  api_key:
    type: string
    label: API Key
    default: ""
  temperature:
    type: float
    label: Temperature
    default: 0.7
    min: 0.0
    max: 2.0
  max_tokens:
    type: integer
    label: Max Tokens
    default: 256
    min: 1
    max: 32768
  batch_delay:
    type: float
    label: Delay Between Rows (s)
    default: 0.0
    min: 0.0
    max: 10.0
    description: "Seconds to wait between rows (rate limiting)"
  response_column:
    type: string
    label: Response Column
    default: "_response"
    description: "Column name for the model's response in output dataset"
  error_handling:
    type: select
    label: Error Handling
    options: [skip, stop]
    default: skip
    description: "skip = log error and continue, stop = abort batch on first error"
  max_rows:
    type: integer
    label: Max Rows
    default: -1
    min: -1
    description: "Process only first N rows (-1 = all). For testing prompts before full batch"
  frequency_penalty:
    type: float
    label: Frequency Penalty
    default: 0.0
    min: -2.0
    max: 2.0
    description: "Penalize repeated tokens (positive = less repetition)"
  presence_penalty:
    type: float
    label: Presence Penalty
    default: 0.0
    min: -2.0
    max: 2.0
    description: "Penalize tokens already present (positive = more diverse topics)"
  dataset_format:
    type: select
    label: Dataset Format
    description: "Output format for the dataset — json (default), jsonl (one JSON object per line), csv (comma-separated values)"
    default: json
    options: [json, jsonl, csv]
