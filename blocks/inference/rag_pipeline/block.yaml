name: RAG Pipeline
type: rag_pipeline
category: inference
description: Retrieval-Augmented Generation — retrieve context chunks and generate an answer
version: "1.0.0"

inputs:
  - id: dataset
    label: Knowledge Base
    data_type: dataset
    required: true
  - id: model
    label: Model
    data_type: model
    required: false
  - id: dataset_meta
    label: Dataset Info
    data_type: config
    required: false

outputs:
  - id: text
    label: Answer
    data_type: text
    description: >
      When output_format=text: plain text file (answer.txt) containing the raw LLM answer.
      When output_format=json: JSON file (answer.json) with schema:
      {"answer": str, "query": str, "model": str, "provider": str,
       "num_chunks_used": int, "elapsed_s": float}.
    aliases: [response, output]
  - id: output_dataset
    label: Context Chunks
    data_type: dataset
    aliases: [dataset]
    description: >
      JSON array of retrieved context chunk objects. Each row contains:
      text (str) — the chunk text content;
      score (float) — similarity score (higher = more relevant), between 0.0 and 1.0;
      index (int) — original row index in the knowledge base;
      source (str, optional) — source field from original row if present.
      Output format configurable via dataset_format (json, jsonl, csv).

  - id: metrics
    label: RAG Metrics
    data_type: metrics
    description: >
      Dictionary with fields:
      query (str) — the user query;
      model (str) — model identifier used for generation;
      provider (str) — inference provider;
      num_chunks_retrieved (int) — number of context chunks retrieved;
      num_chunks_used (int) — number of chunks passed to the LLM (may be less than retrieved if truncated);
      total_context_chars (int) — total character count of context passed to LLM;
      answer_length (int) — character count of the generated answer;
      retrieval_elapsed_s (float) — time spent on retrieval in seconds;
      generation_elapsed_s (float) — time spent on LLM generation in seconds;
      total_elapsed_s (float) — total pipeline time in seconds.

config:
  query:
    type: text_area
    label: Query
    default: ""
    description: "The question to answer using the knowledge base"
  text_column:
    type: string
    label: Text Column
    default: "text"
    description: "Column in the knowledge base containing text chunks"
  top_k:
    type: integer
    label: Top K Chunks
    default: 5
    min: 1
    max: 50
    description: "Number of most relevant chunks to retrieve"
  provider:
    type: select
    label: Provider
    options: [ollama, mlx, openai, anthropic]
    default: ollama
  backend:
    type: select
    label: Inference Backend
    default: ""
    options: ["", "ollama", "mlx", "openai", "anthropic"]
    description: "Override framework auto-detection (leave empty for auto)"
  model_name:
    type: string
    label: Model Name
    default: ""
    description: "Model for answer generation (overridden by connected model input)"
  endpoint:
    type: string
    label: Endpoint URL
    default: "http://localhost:11434"
  api_key:
    type: string
    label: API Key
    default: ""
  temperature:
    type: float
    label: Temperature
    default: 0.3
    min: 0.0
    max: 2.0
  max_tokens:
    type: integer
    label: Max Tokens
    default: 512
    min: 1
    max: 32768
  system_prompt:
    type: text_area
    label: System Prompt
    default: "You are a helpful assistant. Answer the question based only on the provided context. If the context doesn't contain enough information, say so."
    description: "System prompt for the LLM"
  output_format:
    type: select
    label: Output Format
    description: "Format for the answer output — text returns raw answer, json wraps it with metadata (query, model, chunks used)"
    default: text
    options: [text, json]
  dataset_format:
    type: select
    label: Dataset Format
    description: "Output format for context chunks — json (default), jsonl (one JSON object per line), csv (comma-separated values)"
    default: json
    options: [json, jsonl, csv]
