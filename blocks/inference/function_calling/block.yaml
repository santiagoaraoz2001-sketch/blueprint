name: Function Calling
type: function_calling
category: inference
description: LLM with tool/function definitions for structured actions
version: "1.0.0"
deprecated: true
deprecated_message: "Use Agent Orchestrator with Tool Registry for function calling."

inputs:
  - id: model
    label: Model
    data_type: model
    required: false
  - id: text
    label: User Message
    data_type: text
    required: false
  - id: tools
    label: Tool Definitions
    data_type: config
    required: false

outputs:
  - id: response
    label: Response Text
    data_type: text
    description: >
      Plain text file (response.txt) containing the LLM's natural-language
      response. When the model chooses to call tools this may be empty or
      contain a brief explanation alongside the tool calls. When tool_choice
      is "none" this is the full conversational reply. UTF-8 encoded, no JSON
      wrapper.
  - id: tool_calls
    label: Tool Calls
    data_type: config
    description: >
      JSON file (tool_calls.json) containing an array of tool-call objects
      produced by the model. Each object has the fields: id (string, unique
      call identifier assigned by the provider — may be absent for Ollama),
      function (string, the name of the tool/function the model invoked), and
      arguments (object, the parsed key-value arguments passed to the function).
      The array is empty when the model decides no tool call is needed or when
      tool_choice is "none".
  - id: metrics
    label: Metrics
    data_type: metrics
    description: >
      Dictionary with run statistics. Fields: model (string, model name),
      provider (string, one of openai/anthropic/ollama), tools_available
      (integer, number of tool definitions supplied), tool_calls_made (integer,
      number of tool calls the model produced), response_length (integer,
      character count of the response text), prompt_tokens (integer, input
      tokens used), completion_tokens (integer, output tokens generated),
      total_tokens (integer, sum of prompt and completion tokens).

config:
  provider:
    type: select
    label: Provider
    options: [ollama, openai, anthropic]
    default: openai
    description: "Provider must support function calling (OpenAI, Anthropic, Ollama)"
  model_name:
    type: string
    label: Model Name
    default: "gpt-4o"
  tools:
    type: text_area
    label: Tool Definitions (JSON)
    default: "[]"
    description: "JSON array of OpenAI-format tool definitions"
  tool_choice:
    type: select
    label: Tool Choice
    options: [auto, required, none]
    default: auto
    description: "auto=model decides, required=must call a tool, none=no tools"
  user_message:
    type: text_area
    label: User Message
    default: ""
    description: "Direct user message (overridden by connected text input)"
  system_prompt:
    type: text_area
    label: System Prompt
    default: "You are a helpful assistant with access to tools."
  endpoint:
    type: string
    label: Endpoint URL
    default: "https://api.openai.com"
  api_key:
    type: string
    label: API Key
    default: ""
    description: "API key for the provider. Supports $secret:OPENAI_API_KEY syntax"
  temperature:
    type: float
    label: Temperature
    default: 0.3
    min: 0.0
    max: 2.0
  max_tokens:
    type: integer
    label: Max Tokens
    default: 1024
    min: 1
    max: 32768
  top_p:
    type: float
    label: Top P
    default: 1.0
    min: 0.0
    max: 1.0
    description: "Nucleus sampling threshold (1.0 = disabled)"
  max_retries:
    type: integer
    label: Max Retries
    default: 1
    min: 1
    max: 5
    description: "Retry failed API calls up to this many times"
