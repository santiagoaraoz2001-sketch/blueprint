name: Text Summarizer
type: text_summarizer
category: inference
description: Summarize long text using LLM, transformers pipeline, or extractive methods
version: "2.0.0"
deprecated: true
deprecated_message: "Use LLM Inference block with a summarization prompt."

inputs:
  - id: model
    label: Model
    data_type: model
    required: false
  - id: text
    label: Input Text
    data_type: text
    required: true

outputs:
  - id: text
    label: Summary
    data_type: text
    description: >
      Plain text file (summary.txt) containing the generated summary when output_format=text.
      When output_format=json, a JSON file (summary.json) with schema:
      {"response": str (the summary), "model": str, "provider": str, "timestamp": str (ISO 8601), "usage": {"tokens_used": int} (optional)}
  - id: metrics
    label: Stats
    data_type: metrics
    description: >
      Dictionary with fields: input_length (int, chars), output_length (int, chars),
      compression_ratio (float), style (str), method (str — llm|transformers|extractive),
      elapsed_s (float, seconds), tokens_used (int, optional)

config:
  method:
    type: select
    label: Method
    options: [llm, transformers, extractive]
    default: llm
    description: "llm uses cloud/local LLM, transformers uses HF pipeline, extractive uses sentence scoring"
  provider:
    type: select
    label: Provider
    options: [ollama, mlx, openai, anthropic]
    default: ollama
    description: "LLM provider (used when method=llm)"
  model_name:
    type: string
    label: Model Name
    default: "llama3.2"
    description: "Model for LLM summarization or HF model path"
  endpoint:
    type: string
    label: Endpoint URL
    default: "http://localhost:11434"
  api_key:
    type: string
    label: API Key
    default: ""
    description: "API key for OpenAI/Anthropic"
  max_length:
    type: integer
    label: Max Length (tokens)
    description: Maximum summary length in tokens
    default: 256
    min: 32
    max: 4096
  style:
    type: select
    label: Style
    description: Summarization style
    default: concise
    options: [concise, detailed, bullet_points, abstract]
  system_prompt:
    type: text_area
    label: System Prompt
    default: ""
    description: "Custom system prompt for LLM summarization (optional)"
  temperature:
    type: float
    label: Temperature
    default: 0.5
    min: 0.0
    max: 2.0
    description: "LLM sampling temperature (lower = more focused summaries)"
  max_input_chars:
    type: integer
    label: Max Input Characters
    default: 12000
    min: 500
    max: 100000
    description: "Truncate input text beyond this length before sending to LLM"
  output_format:
    type: select
    label: Output Format
    description: "Format for the response output — text returns raw LLM response, json wraps it with metadata (model, provider, tokens, timestamp)"
    default: text
    options: [text, json]
