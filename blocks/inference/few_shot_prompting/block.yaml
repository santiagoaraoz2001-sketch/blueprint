name: Few-Shot Prompting
type: few_shot_prompting
category: inference
description: In-context learning with example-based prompting for any LLM
version: "1.0.0"

inputs:
  - id: model
    label: Model
    data_type: model
    required: false
  - id: dataset
    label: Examples Dataset
    data_type: dataset
    required: false
  - id: text
    label: Query / Input
    data_type: text
    required: false

outputs:
  - id: response
    label: Response
    data_type: text
    description: >
      Plain text file (response.txt) containing the raw LLM response when output_format=text.
      When output_format=json, a JSON file (response.json) with schema:
      {"response": str, "model": str, "provider": str, "timestamp": str (ISO 8601), "usage": {"prompt_tokens": int, "completion_tokens": int, "total_tokens": int} (optional)}
  - id: prompt
    label: Assembled Prompt
    data_type: text
    description: >
      Plain text file (assembled_prompt.txt) containing the fully assembled few-shot prompt
      including prefix, selected examples formatted with example_format, suffix, and the query
  - id: metrics
    label: Metrics
    data_type: metrics
    description: >
      Dictionary with fields: examples_used (int), examples_available (int), strategy (str),
      prompt_length (int, chars), response_length (int, chars), model (str), provider (str),
      prompt_tokens (int, optional), completion_tokens (int, optional), total_tokens (int, optional)

config:
  provider:
    type: select
    label: Provider
    options: [ollama, mlx, openai, anthropic]
    default: ollama
  model_name:
    type: string
    label: Model Name
    default: "llama3.2"
  num_examples:
    type: integer
    label: Number of Examples
    default: 3
    min: 1
    max: 50
    description: "How many examples to include in the prompt"
  input_column:
    type: string
    label: Input Column
    default: "input"
    description: "Column name for example inputs"
  output_column:
    type: string
    label: Output Column
    default: "output"
    description: "Column name for example outputs"
  selection_strategy:
    type: select
    label: Selection Strategy
    options: [sequential, random]
    default: sequential
    description: "How to select examples from the dataset"
  prompt_prefix:
    type: text_area
    label: Prompt Prefix
    default: "Here are some examples:\n\n"
    description: "Text before the examples"
  prompt_suffix:
    type: text_area
    label: Prompt Suffix
    default: "\n\nNow respond to the following:\n"
    description: "Text between examples and the query"
  example_format:
    type: string
    label: Example Format
    default: "Input: {input}\nOutput: {output}"
    description: "Template for each example. Use {input} and {output}"
  query:
    type: text_area
    label: Query
    default: ""
    description: "Direct query text (overridden by connected text input)"
  endpoint:
    type: string
    label: Endpoint URL
    default: "http://localhost:11434"
  api_key:
    type: string
    label: API Key
    default: ""
  temperature:
    type: float
    label: Temperature
    default: 0.5
    min: 0.0
    max: 2.0
  max_tokens:
    type: integer
    label: Max Tokens
    default: 512
    min: 1
    max: 32768
  system_prompt:
    type: text_area
    label: System Prompt
    default: ""
    description: "System instruction for the LLM (e.g. 'You are a sentiment classifier')"
  example_separator:
    type: string
    label: Example Separator
    default: "\\n\\n"
    description: "String between examples in the assembled prompt"
  frequency_penalty:
    type: float
    label: Frequency Penalty
    default: 0.0
    min: -2.0
    max: 2.0
    description: "Penalize repeated tokens (positive = less repetition)"
  presence_penalty:
    type: float
    label: Presence Penalty
    default: 0.0
    min: -2.0
    max: 2.0
    description: "Penalize tokens already present (positive = more diverse topics)"
  output_format:
    type: select
    label: Output Format
    description: "Format for the response output — text returns raw LLM response, json wraps it with metadata (model, provider, tokens, timestamp)"
    default: text
    options: [text, json]
