name: Model Benchmark
type: model_benchmark
category: inference
description: Benchmark model performance with latency, throughput, and quality metrics
version: "1.0.0"

inputs:
  - id: model
    label: Model
    data_type: model
    required: false
  - id: dataset
    label: Prompt Dataset
    data_type: dataset
    required: false
  - id: dataset_meta
    label: Dataset Info
    data_type: config
    required: false

outputs:
  - id: dataset
    label: Benchmark Results
    data_type: dataset
    description: >
      JSON array of per-prompt result objects. Each row contains:
      prompt (str) — the input prompt text (truncated to 500 chars);
      response (str) — the model's generated response;
      latency_seconds (float) — wall-clock time for this request in seconds;
      tokens_generated (int) — number of characters in the response divided by 4 (estimated);
      tokens_per_second (float) — estimated throughput (tokens_generated / latency_seconds);
      success (bool) — whether the request completed without error;
      error (str, optional) — error message if the request failed.
      Output format configurable via dataset_format (json, jsonl, csv).
  - id: metrics
    label: Summary Metrics
    data_type: metrics
    description: >
      Aggregated benchmark statistics. Fields:
      model (str) — the model identifier used;
      provider (str) — inference provider;
      total_prompts (int) — number of prompts benchmarked;
      successful (int) — number of prompts that completed successfully;
      failed (int) — number of prompts that errored;
      avg_latency_s (float) — mean latency across successful prompts in seconds;
      min_latency_s (float) — fastest prompt latency in seconds;
      max_latency_s (float) — slowest prompt latency in seconds;
      p50_latency_s (float) — median (50th percentile) latency in seconds;
      p95_latency_s (float) — 95th percentile latency in seconds;
      avg_tokens_per_second (float) — mean throughput across successful prompts;
      total_elapsed_s (float) — total wall-clock time for the full benchmark;
      avg_response_length (float) — mean character count of responses.

config:
  provider:
    type: select
    label: Provider
    options: [ollama, mlx, openai, anthropic]
    default: ollama
  backend:
    type: select
    label: Inference Backend
    default: ""
    options: ["", "ollama", "mlx", "openai", "anthropic"]
    description: "Override framework auto-detection (leave empty for auto)"
  model_name:
    type: string
    label: Model Name
    default: ""
    description: "Model identifier (overridden by connected model input)"
  endpoint:
    type: string
    label: Endpoint URL
    default: "http://localhost:11434"
  api_key:
    type: string
    label: API Key
    default: ""
  temperature:
    type: float
    label: Temperature
    default: 0.7
    min: 0.0
    max: 2.0
  max_tokens:
    type: integer
    label: Max Tokens
    default: 256
    min: 1
    max: 32768
  prompts:
    type: text_area
    label: Benchmark Prompts
    default: "Explain quantum computing in simple terms.\nWrite a short poem about the ocean.\nWhat are the benefits of exercise?"
    description: "One prompt per line. Used if no dataset is connected."
  text_column:
    type: string
    label: Text Column
    default: "text"
    description: "Column containing prompts when using a dataset input"
  warmup_runs:
    type: integer
    label: Warmup Runs
    default: 0
    min: 0
    max: 5
    description: "Number of warmup requests before benchmarking (discarded from results)"
  dataset_format:
    type: select
    label: Dataset Format
    description: "Output format for results — json (default), jsonl (one JSON object per line), csv (comma-separated values)"
    default: json
    options: [json, jsonl, csv]

side_inputs:
  - id: _loop
    label: Loop
    data_type: any
    required: false
