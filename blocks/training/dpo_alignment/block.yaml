name: DPO Alignment
type: dpo_alignment
category: training
description: Direct Preference Optimization — align a model using chosen/rejected preference pairs
version: "1.0.0"

inputs:
  - id: dataset
    label: Preference Data
    data_type: dataset
    required: true
  - id: model
    label: Base Model
    data_type: model
    required: false

outputs:
  - id: aligned_model
    label: Aligned Model
    aliases: [model]
    data_type: model

  - id: metrics
    label: DPO Metrics
    data_type: metrics

config:
  model_name:
    type: string
    label: Base Model
    description: HuggingFace model name or local path
    mandatory: true
  beta:
    type: float
    label: Beta
    description: "DPO temperature parameter — lower values make the model more deterministic"
    default: 0.1
    min: 0.01
    max: 1.0
  lr:
    type: float
    label: Learning Rate
    default: 0.0000005
    min: 0.00000001
    max: 0.001
  epochs:
    type: integer
    label: Epochs
    default: 1
    min: 1
    max: 20
  batch_size:
    type: integer
    label: Batch Size
    default: 4
    min: 1
    max: 64
  max_length:
    type: integer
    label: Max Length
    description: Maximum sequence length for chosen/rejected pairs
    default: 512
    min: 64
    max: 8192
  max_prompt_length:
    type: integer
    label: Max Prompt Length
    description: Maximum length for the prompt portion
    default: 256
    min: 32
    max: 4096
  prompt_column:
    type: string
    label: Prompt Column
    description: Column name for prompts in your dataset
    default: prompt
  chosen_column:
    type: string
    label: Chosen Column
    description: Column name for preferred responses
    default: chosen
  rejected_column:
    type: string
    label: Rejected Column
    description: Column name for rejected responses
    default: rejected
  eval_split:
    type: float
    label: Eval Split
    description: "Fraction of data to use for validation (0 = no eval, 0.1 = 10% eval)"
    default: 0.0
    min: 0.0
    max: 0.3
  prefer_framework:
    type: select
    label: Preferred Framework
    options: ["auto", "mlx", "pytorch"]
    default: "auto"
    description: "Force a specific training framework. 'auto' detects the best available."

side_inputs:
  - id: _loop
    label: Loop
    data_type: any
    required: false
