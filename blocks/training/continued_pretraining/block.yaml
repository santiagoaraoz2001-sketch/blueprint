name: Continued Pre-Training
type: continued_pretraining
category: training
description: Continue pre-training a model on domain-specific text corpus
version: "1.0.0"

inputs:
  - id: dataset
    label: Corpus
    data_type: dataset
    required: true
  - id: model
    label: Base Model
    data_type: model
    required: false
  - id: dataset_meta
    label: Dataset Info
    data_type: config
    required: false

outputs:
  - id: trained_model
    label: Pre-trained Model
    aliases: [model]
    data_type: model

  - id: metrics
    label: Loss Curve
    data_type: metrics

config:
  model_name:
    type: string
    label: Base Model
    description: HuggingFace model name or local path
    mandatory: true
  lr:
    type: float
    label: Learning Rate
    default: 0.00001
    min: 0.0000001
    max: 0.001
  epochs:
    type: integer
    label: Epochs
    default: 1
    min: 1
    max: 50
  batch_size:
    type: integer
    label: Batch Size
    default: 4
    min: 1
    max: 128
  max_seq_length:
    type: integer
    label: Max Sequence Length
    description: Maximum token length for training documents
    default: 2048
    min: 128
    max: 32768
  warmup_ratio:
    type: float
    label: Warmup Ratio
    description: Proportion of total steps used for LR warmup
    default: 0.05
    min: 0.0
    max: 0.5
  text_column:
    type: string
    label: Text Column
    description: "JSON key containing training text (leave empty for auto-detect: 'text' or first key)"
    default: ""
  eval_split:
    type: float
    label: Eval Split
    description: "Fraction of data to use for validation (0 = no eval, 0.1 = 10% eval)"
    default: 0.0
    min: 0.0
    max: 0.3
  checkpoint_interval:
    type: integer
    label: Checkpoint Interval
    description: "Save checkpoint every N epochs (0 = final only)"
    default: 0
    min: 0
    max: 100
  prefer_framework:
    type: select
    label: Preferred Framework
    options: ["auto", "mlx", "pytorch"]
    default: "auto"
    description: "Force a specific training framework. 'auto' detects the best available."

side_inputs:
  - id: _loop
    label: Loop
    data_type: any
    required: false
