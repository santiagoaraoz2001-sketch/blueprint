name: QLoRA Fine-Tuning
type: qlora_finetuning
category: training
description: LoRA with 4-bit quantization for memory-efficient fine-tuning on consumer GPUs
version: "1.0.0"

inputs:
  - id: dataset
    label: Training Data
    data_type: dataset
    required: true
  - id: model
    label: Base Model
    data_type: model
    required: false
  - id: dataset_meta
    label: Dataset Info
    data_type: config
    required: false

outputs:
  - id: trained_model
    label: QLoRA Model
    aliases: [model]
    data_type: model

  - id: metrics
    label: Training Metrics
    data_type: metrics

config:
  model_name:
    type: string
    label: Base Model
    description: HuggingFace model name or local path
  r:
    type: integer
    label: LoRA Rank (r)
    description: Rank of the low-rank adaptation matrices
    default: 16
    min: 1
    max: 256
  alpha:
    type: integer
    label: LoRA Alpha
    description: Scaling factor for LoRA weights
    default: 32
    min: 1
    max: 512
  bits:
    type: select
    label: Quantization Bits
    description: Number of bits for base model quantization
    default: "4"
    options: ["4", "8"]
  double_quant:
    type: boolean
    label: Double Quantization
    description: Apply a second round of quantization to save additional memory
    default: true
  lora_dropout:
    type: float
    label: LoRA Dropout
    description: Dropout probability for LoRA layers
    default: 0.05
    min: 0.0
    max: 0.5
  target_modules:
    type: string
    label: Target Modules
    description: "Comma-separated module names to apply LoRA to"
    default: "q_proj,v_proj"
  lr:
    type: float
    label: Learning Rate
    default: 0.0002
    min: 0.0000001
    max: 0.01
  epochs:
    type: integer
    label: Epochs
    default: 3
    min: 1
    max: 100
  batch_size:
    type: integer
    label: Batch Size
    default: 4
    min: 1
    max: 128
  max_seq_length:
    type: integer
    label: Max Sequence Length
    description: Maximum token length for training samples
    default: 512
    min: 64
    max: 32768
  text_column:
    type: string
    label: Text Column
    description: "JSON key containing training text (leave empty for auto-detect: 'text' or first key)"
    default: ""
  training_format:
    type: text_area
    label: Training Format
    description: "Template for structuring training examples. Use {text}, {instruction}, {output} placeholders."
    default: ""
  eval_split:
    type: float
    label: Eval Split
    description: "Fraction of data to use for validation (0 = no eval, 0.1 = 10% eval)"
    default: 0.0
    min: 0.0
    max: 0.3
  save_merged:
    type: boolean
    label: Save Merged Model
    description: "Merge QLoRA adapters into base model weights before saving (creates standalone model instead of adapter-only)"
    default: false
  checkpoint_interval:
    type: integer
    label: Checkpoint Interval
    description: "Save checkpoint every N epochs (0 = final only)"
    default: 0
    min: 0
    max: 100
