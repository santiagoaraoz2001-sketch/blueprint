name: Full Fine-Tuning
type: full_finetuning
category: training
description: Full parameter fine-tuning — all model weights are updated
version: 1.0.0
inputs:
- id: dataset
  label: Training Data
  data_type: dataset
  required: true
- id: model
  label: Base Model
  data_type: model
  required: false
- id: dataset_meta
  label: Dataset Info
  data_type: config
  required: false
outputs:
- id: trained_model
  label: Fine-tuned Model
  aliases:
  - model
  data_type: model
- id: metrics
  label: Training Metrics
  data_type: metrics
config:
  model_name:
    type: string
    label: Base Model
    description: HuggingFace model name or local path
    mandatory: true
  lr:
    type: float
    label: Learning Rate
    default: 2.0e-05
    min: 1.0e-07
    max: 0.01
    section: training
  epochs:
    type: integer
    label: Epochs
    default: 3
    min: 1
    max: 100
    section: training
  batch_size:
    type: integer
    label: Batch Size
    default: 4
    min: 1
    max: 128
    section: training
  warmup_steps:
    type: integer
    label: Warmup Steps
    description: Number of warmup steps for LR scheduler
    default: 100
    min: 0
    max: 10000
  weight_decay:
    type: float
    label: Weight Decay
    description: L2 regularization strength
    default: 0.01
    min: 0.0
    max: 1.0
  max_seq_length:
    type: integer
    label: Max Sequence Length
    description: Maximum token length for training samples
    default: 512
    min: 64
    max: 32768
    propagate: true
    section: training
  gradient_checkpointing:
    type: boolean
    label: Gradient Checkpointing
    description: Trade compute for memory by recomputing activations
    default: true
  text_column:
    type: string
    label: Text Column
    description: 'JSON key containing training text (leave empty for auto-detect:
      ''text'' or first key)'
    default: ''
    propagate: true
  training_format:
    type: text_area
    label: Training Format
    description: Template for structuring training examples. Use {text}, {instruction},
      {output} placeholders.
    default: ''
    propagate: true
  eval_split:
    type: float
    label: Eval Split
    description: Fraction of data to use for validation (0 = no eval, 0.1 = 10% eval)
    default: 0.0
    min: 0.0
    max: 0.3
    section: advanced
  checkpoint_interval:
    type: integer
    label: Checkpoint Interval
    description: Save checkpoint every N epochs (0 = final only)
    default: 0
    min: 0
    max: 100
    section: advanced
  mlx_lora_layers:
    type: integer
    label: MLX LoRA Layers
    default: 16
    min: 1
    max: 64
    description: Number of transformer layers to fine-tune (MLX only). Lower = less
      memory.
    section: advanced
  prefer_framework:
    type: select
    label: Preferred Framework
    options:
    - auto
    - mlx
    - pytorch
    default: auto
    description: Force a specific training framework. 'auto' detects the best available.
    section: advanced
side_inputs:
- id: _loop
  label: Loop
  data_type: any
  required: false
maturity: stable
exportable: true
requires: []
execution:
  isolation: inprocess
