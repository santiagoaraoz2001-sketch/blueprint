name: Hyperparameter Sweep
type: hyperparameter_sweep
category: training
description: "[DEMO] Simulated hyperparameter sweep with synthetic loss curves (real execution requires: torch, transformers)"
version: "1.0.0"
maturity: experimental

inputs:
  - id: dataset
    label: Training Data
    data_type: dataset
    required: true
  - id: model
    label: Base Model
    data_type: model
    required: false

outputs:
  - id: model
    label: Best Model
    data_type: model
  - id: metrics
    label: Sweep Results
    data_type: metrics

config:
  search_type:
    type: select
    label: Search Type
    description: Strategy for exploring the hyperparameter space
    default: grid
    options: [grid, random]
  param_space:
    type: text_area
    label: Parameter Space (JSON)
    description: 'JSON object mapping param names to lists of values, e.g. {"lr": [1e-4, 5e-5], "batch_size": [4, 8]}'
    default: "{}"
  n_trials:
    type: integer
    label: Max Trials
    description: Maximum number of hyperparameter combinations to try
    default: 10
    min: 1
    max: 100
  metric:
    type: string
    label: Optimize Metric
    description: Name of the metric to optimize (e.g. eval_loss, accuracy)
    default: eval_loss
  mode:
    type: select
    label: Optimization Mode
    description: Whether to minimize or maximize the target metric
    default: min
    options: [min, max]
