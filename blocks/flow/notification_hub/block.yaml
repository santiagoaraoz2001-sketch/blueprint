name: Notification Hub
type: notification_hub
category: interventions
description: Send notifications via Telegram, Slack, or email using user-provided API credentials
version: "1.0.0"

inputs:
  - id: data
    label: Trigger Data
    data_type: any
    required: true

outputs:
  - id: status
    label: Send Status
    data_type: metrics
    description: "JSON: {channel, severity, message, delivered, attempts, timestamp, details}. If skipped: {skipped, reason, channel}."
  - id: pass_through
    label: Pass Through
    data_type: any
    description: "Trigger data forwarded unchanged — enables inline pipeline usage"

config:
  channel:
    type: select
    label: Channel
    default: "telegram"
    options: ["telegram", "email", "slack"]
    description: "Which messaging service to use"
  api_token:
    type: string
    label: API Token
    default: ""
    description: "Telegram bot token, or Slack incoming webhook URL"
  recipient:
    type: string
    label: Recipient
    default: ""
    description: "Telegram chat ID, email address, or Slack channel"
  template:
    type: text_area
    label: Message Template
    default: "Pipeline update: {status}"
    description: "Use {status}, {timestamp}, or any key from trigger data as placeholders"
  severity:
    type: select
    label: Severity
    default: "info"
    options: ["info", "warning", "error", "critical"]
    description: "Severity level — prepended as tag to message for warning/error/critical"
  retry_count:
    type: integer
    label: Retry Count
    default: 0
    min: 0
    max: 5
    description: "Number of retries if delivery fails (0 = no retries)"
  smtp_host:
    type: string
    label: SMTP Host
    default: "smtp.gmail.com"
    description: "SMTP server hostname (email channel only)"
  smtp_port:
    type: integer
    label: SMTP Port
    default: 587
    min: 1
    max: 65535
    description: "SMTP server port. 587 for TLS, 465 for SSL."
  smtp_user:
    type: string
    label: SMTP Username
    default: ""
    description: "SMTP login username (email channel only)"
  smtp_pass:
    type: string
    label: SMTP Password
    default: ""
    description: "SMTP login password or app password (email channel only)"
  email_subject:
    type: string
    label: Email Subject
    default: "Blueprint Pipeline Notification"
    description: "Subject line for email notifications"
  include_data_summary:
    type: boolean
    label: Include Data Summary
    default: false
    description: "Append a preview of trigger data fields to the notification message"
  min_severity:
    type: select
    label: Min Severity
    default: "info"
    options: ["info", "warning", "error", "critical"]
    description: "Only send if severity meets or exceeds this level (filters out noise)"

side_inputs:
  - id: _loop
    label: Loop
    data_type: any
    required: false
