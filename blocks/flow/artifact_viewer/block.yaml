name: Artifact Viewer
type: artifact_viewer
category: flow
description: View, inspect, and download generated artifacts
version: "1.0.0"

inputs:
  - id: artifact
    label: Artifact
    data_type: artifact
    required: true

outputs:
  - id: summary
    label: Artifact Manifest
    data_type: metrics
    description: "JSON manifest with artifact type, size, preview, and path information"

config:
  auto_open:
    type: boolean
    label: Auto-Open
    description: Automatically display artifact when ready
    default: true
  display_mode:
    type: select
    label: Display
    description: How to display the artifact
    default: preview
    options: [preview, raw, download]

side_inputs:
  - id: _loop
    label: Loop
    data_type: any
    required: false
