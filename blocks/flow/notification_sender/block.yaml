name: Notification Sender
type: notification_sender
category: interventions
description: Send notifications via webhook, desktop alert, or log file when pipeline reaches a point
version: "1.0.0"

inputs:
  - id: trigger
    label: Trigger Data
    data_type: any
    required: true
  - id: message_data
    label: Message Data
    data_type: text
    required: false

outputs:
  - id: status
    label: Send Status
    data_type: metrics
    description: "JSON: {channel, severity, message, delivered, timestamp, details}. If skipped: {skipped, reason, channel}."
    aliases: [metrics]
  - id: pass_through
    label: Pass Through
    data_type: any
    description: "Trigger data forwarded unchanged — enables inline pipeline usage"

config:
  channel:
    type: select
    label: Channel
    default: "log"
    options: ["webhook", "desktop", "log"]
    description: "Delivery channel for the notification"
  webhook_url:
    type: string
    label: Webhook URL
    default: ""
    description: "Target URL for webhook POST (required when channel is 'webhook')"
  message_template:
    type: text_area
    label: Message Template
    default: "Pipeline notification: {status}"
    description: "Use {status}, {timestamp}, {severity}, or any key from trigger data as placeholders"
  severity:
    type: select
    label: Severity
    default: "info"
    options: ["info", "warning", "error", "critical"]
    description: "Severity level included in the notification"
  include_metrics:
    type: boolean
    label: Include Metrics
    default: true
    description: "Include numeric metrics from trigger data in the notification payload"
  webhook_headers:
    type: text_area
    label: Custom Webhook Headers
    default: ""
    description: "One header per line: Header-Name: value (e.g., Authorization: Bearer <token>)"
  notification_title:
    type: string
    label: Notification Title
    default: ""
    description: "Custom title for desktop notifications (defaults to 'Blueprint [SEVERITY]')"
  send_condition:
    type: select
    label: Send Condition
    default: "always"
    options: ["always", "on_failure", "on_success"]
    description: "Conditionally send — checks trigger data for status/gate_passed/error fields"
  timeout:
    type: integer
    label: Timeout (seconds)
    default: 30
    min: 10
    max: 300
    description: "Maximum time for webhook or desktop notification delivery"

side_inputs:
  - id: _loop
    label: Loop
    data_type: any
    required: false
