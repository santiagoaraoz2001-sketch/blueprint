name: Data Export
type: data_export
category: endpoints
description: Export pipeline data as CSV, JSON, JSONL, Parquet, YAML, or plain text with format-specific options
version: "1.0.0"
aliases: [save_csv, save_json, save_parquet, save_txt, save_yaml, save_local]

inputs:
  - id: data
    label: Data
    data_type: any
    required: true
    description: "Structured data (list of dicts) for CSV/Parquet, or any data for JSON/YAML/TXT"

outputs:
  - id: file_path
    label: Saved File Path
    data_type: artifact
    description: "Absolute path to the saved file"
  - id: status
    label: Save Status
    data_type: metrics
  - id: summary
    label: Export Summary
    data_type: metrics
    description: "Object with format-specific stats: rows, columns, file_size_bytes, etc."
    aliases: [metrics]

config:
  format:
    type: select
    label: Format
    options: [auto, csv, json, jsonl, parquet, txt, yaml]
    default: auto
    description: "Output format. 'auto' detects from data type (list of dicts → CSV, string → TXT, else JSON)."
  output_path:
    type: file_path
    label: Output Path
    default: ./output
    description: "Directory to save to (relative to run directory or absolute)"
    path_mode: directory
  filename:
    type: string
    label: Filename
    default: output
    description: "Filename (extension auto-added based on format)"
  overwrite_existing:
    type: boolean
    label: Overwrite Existing
    default: true
  timestamp_filename:
    type: boolean
    label: Timestamp Filename
    default: false
    description: "Append timestamp to filename for versioning"
  create_dirs:
    type: boolean
    label: Create Directories
    default: true
    description: "Create output directories if they don't exist"
  include_metadata:
    type: boolean
    label: Include Metadata
    default: false
    description: "Write a .meta.json sidecar with run info"

  # ── CSV-specific ──
  delimiter:
    type: select
    label: Delimiter
    options: [",", ";", "\\t", "|"]
    default: ","
    depends_on:
      field: format
      value: "csv"
  include_header:
    type: boolean
    label: Include Header
    default: true
    depends_on:
      field: format
      value: "csv"
  csv_encoding:
    type: select
    label: Encoding
    options: [utf-8, ascii, latin-1, utf-16]
    default: utf-8
    depends_on:
      field: format
      value: "csv"
  quote_all:
    type: boolean
    label: Quote All Fields
    default: false
    description: "Wrap every field in quotes"
    depends_on:
      field: format
      value: "csv"
  columns:
    type: string
    label: Columns Filter
    default: ""
    description: "Comma-separated column names to include (empty = all)"
    depends_on:
      field: format
      value: "csv"
  na_value:
    type: string
    label: Missing Value
    default: ""
    description: "String to use for missing/null values"
    depends_on:
      field: format
      value: "csv"

  # ── JSON-specific ──
  pretty_print:
    type: boolean
    label: Pretty Print
    default: true
    description: "Format JSON with indentation"
    depends_on:
      field: format
      value: "json"
  indent:
    type: integer
    label: Indent Spaces
    default: 2
    min: 0
    max: 8
    depends_on:
      field: pretty_print
      value: true
  sort_keys:
    type: boolean
    label: Sort Keys
    default: false
    description: "Alphabetically sort keys"
  ensure_ascii:
    type: boolean
    label: Ensure ASCII
    default: false
    description: "Escape non-ASCII characters"
    depends_on:
      field: format
      value: "json"
  root_key:
    type: string
    label: Root Key
    default: ""
    description: 'Wrap data under a root key (e.g. "results" produces {"results": [...]})'
    depends_on:
      field: format
      value: "json"

  # ── Parquet-specific ──
  compression:
    type: select
    label: Compression
    options: [snappy, gzip, zstd, lz4, none]
    default: snappy
    description: "Parquet compression codec"
    depends_on:
      field: format
      value: "parquet"
  row_group_size:
    type: integer
    label: Row Group Size
    default: 0
    min: 0
    description: "Rows per group (0 = auto)"
    depends_on:
      field: format
      value: "parquet"

  # ── TXT-specific ──
  txt_encoding:
    type: select
    label: Encoding
    options: [utf-8, ascii, latin-1, utf-16]
    default: utf-8
    depends_on:
      field: format
      value: "txt"
  append_mode:
    type: boolean
    label: Append Mode
    default: false
    description: "Append to file instead of overwriting"
    depends_on:
      field: format
      value: "txt"
  max_length:
    type: integer
    label: Max Length (chars)
    default: 0
    min: 0
    description: "Truncate output at this many characters (0 = no limit)"
    depends_on:
      field: format
      value: "txt"
  line_ending:
    type: select
    label: Line Ending
    options: [LF, CRLF]
    default: LF
    depends_on:
      field: format
      value: "txt"
  prefix:
    type: string
    label: Prefix Text
    default: ""
    depends_on:
      field: format
      value: "txt"
  suffix:
    type: string
    label: Suffix Text
    default: ""
    depends_on:
      field: format
      value: "txt"
  trim_whitespace:
    type: boolean
    label: Trim Whitespace
    default: false
    depends_on:
      field: format
      value: "txt"

  # ── YAML-specific ──
  default_flow_style:
    type: boolean
    label: Compact Style
    default: false
    description: "Use flow (inline) style for short sequences/mappings"
    depends_on:
      field: format
      value: "yaml"
  allow_unicode:
    type: boolean
    label: Allow Unicode
    default: true
    depends_on:
      field: format
      value: "yaml"
  header_comment:
    type: text_area
    label: Header Comment
    default: ""
    description: "Comment block prepended to YAML file (each line gets # prefix)"
    depends_on:
      field: format
      value: "yaml"

side_inputs:
  - id: _loop
    label: Loop
    data_type: any
    required: false
