name: Save JSON
type: save_json
category: endpoints
description: Save data as JSON or JSONL file with pretty-print and schema options.
version: "1.0.0"

inputs:
  - id: data
    label: Data
    data_type: any
    required: true

outputs:
  - id: file_path
    label: Saved File Path
    data_type: artifact
    description: "Absolute path to the saved JSON/JSONL file"
  - id: status
    label: Save Status
    data_type: metrics
  - id: summary
    label: Export Summary
    data_type: metrics
    description: "Object with keys: records (int), file_size_bytes (int), format (string: json|jsonl)"

config:
  output_path:
    type: string
    label: Output Path
    default: ./output
  filename:
    type: string
    label: Filename
    default: data.json
  format:
    type: select
    label: Format
    options: [json, jsonl]
    default: json
    description: JSON (single file) or JSONL (one object per line)
  pretty_print:
    type: boolean
    label: Pretty Print
    default: true
    description: Format JSON with indentation (only for JSON format)
  indent:
    type: integer
    label: Indent Spaces
    default: 2
    min: 0
    max: 8
    depends_on:
      field: pretty_print
      value: true
  sort_keys:
    type: boolean
    label: Sort Keys
    default: false
    description: Alphabetically sort JSON keys
  overwrite_existing:
    type: boolean
    label: Overwrite Existing
    default: true
  ensure_ascii:
    type: boolean
    label: Ensure ASCII
    default: false
    description: Escape non-ASCII characters in output
  timestamp_filename:
    type: boolean
    label: Timestamp Filename
    default: false
    description: Append timestamp to filename for versioning
  root_key:
    type: string
    label: Root Key
    default: ""
    description: 'Wrap data under a root key (e.g. "results" produces {"results": [...]})'
