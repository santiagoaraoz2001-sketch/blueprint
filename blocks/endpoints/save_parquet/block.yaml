name: Save Parquet
type: save_parquet
category: endpoints
description: Save data as a Parquet columnar file with compression options.
version: "1.0.0"

inputs:
  - id: data
    label: Data
    data_type: dataset
    required: true

outputs:
  - id: file_path
    label: File Path
    data_type: text
    description: "Absolute path to the saved Parquet file"
  - id: summary
    label: Export Summary
    data_type: metrics
    description: "Object with keys: rows (int), columns (int), file_size_bytes (int), compression (string)"

config:
  output_path:
    type: string
    label: Output Path
    default: ./output
  filename:
    type: string
    label: Filename
    default: data.parquet
  compression:
    type: select
    label: Compression
    options: [snappy, gzip, zstd, lz4, none]
    default: snappy
    description: Parquet compression codec
  row_group_size:
    type: integer
    label: Row Group Size
    default: 0
    min: 0
    description: Rows per group (0 = auto)
  overwrite_existing:
    type: boolean
    label: Overwrite Existing
    default: true
  timestamp_filename:
    type: boolean
    label: Timestamp Filename
    default: false
    description: Append timestamp to filename for versioning

side_inputs:
  - id: _loop
    label: Loop
    data_type: any
    required: false
